{% extends 'core/home.html' %}

{% block content %}
<h1>Метки</h1>

<a class="btn btn-primary mb-3" href="{% url 'label_create' %}">Создать метку</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Дата создания</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for label in labels %}
            <tr>
                <td>{{ label.id }}</td>
                <td>{{ label.name }}</td>
                <td>-</td>
                <td>
                    <a href="{% url 'label_update' label.pk %}">Изменить</a>
                    <a href="{% url 'label_delete' label.pk %}">Удалить</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="4">Меток пока нет</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
