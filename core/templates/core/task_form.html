{% extends 'core/home.html' %}
{% load django_bootstrap5 %}

{% block content %}
<h1>{% if object %}Изменить задачу{% else %}Создать задачу{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">
        {% if object %}Изменить{% else %}Создать{% endif %}
    </button>
</form>
{% endblock %}
