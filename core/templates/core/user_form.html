{% extends 'core/home.html' %}
{% load django_bootstrap5 %}

{% block content %}
<h1 class="my-4">
    {% if view.object %}Изменение пользователя{% else %}Регистрация{% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">
        {% if view.object %}Изменить{% else %}Зарегистрировать{% endif %}
    </button>
</form>
{% endblock %}
